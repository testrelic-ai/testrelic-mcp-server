name: CI

on:
  pull_request:
    branches: [main, stage, prod]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm install --no-audit --no-fund

      - name: Build MCP package (required for extension typecheck)
        run: npm --workspace @testrelic/mcp run build
      - run: npm --workspaces run typecheck
      - run: npm --workspaces run build
      - run: npm run copy-config
      - run: npm run update-readme

      - name: Run contract + token-baseline tests
        run: npm test

      - name: Verify README is in sync
        run: |
          if [[ -n "$(git status --porcelain packages/mcp/README.md)" ]]; then
            echo "::error::packages/mcp/README.md is out of date. Run 'npm run update-readme'."
            git diff packages/mcp/README.md
            exit 1
          fi

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mcp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: testrelic/mcp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

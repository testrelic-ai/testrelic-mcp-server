name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ vars.MCP_ECR_REPOSITORY }}
  ECS_CLUSTER_NAME: ${{ vars.ECS_CLUSTER_NAME }}
  ECS_SERVICE_NAME: ${{ vars.PROD_MCP_ECS_SERVICE }}
  ECS_TASK_FAMILY: ${{ vars.PROD_MCP_TASK_FAMILY }}
  INGRESS_HOST: ${{ vars.PROD_MCP_HOST }}

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # 0. Resolve environment
  # ───────────────────────────────────────────────────────────────────────
  resolve-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Set environment name
        id: set-env
        run: echo "environment=prod" >> "$GITHUB_OUTPUT"

  # ───────────────────────────────────────────────────────────────────────
  # 1. Build & push MCP image to ECR
  # ───────────────────────────────────────────────────────────────────────
  build-and-push-image:
    runs-on: ubuntu-latest
    needs: [resolve-environment]
    environment: ${{ needs.resolve-environment.outputs.environment }}
    outputs:
      image-tag: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GH_ACTIONS_ROLE_ARN }}
          role-session-name: GitHubActionsMcpDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker

      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/mcp/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:prod-latest

  # ───────────────────────────────────────────────────────────────────────
  # 2. Deploy to ECS
  # ───────────────────────────────────────────────────────────────────────
  deploy-mcp:
    runs-on: ubuntu-latest
    needs: [resolve-environment, build-and-push-image]
    environment: ${{ needs.resolve-environment.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GH_ACTIONS_ROLE_ARN }}
          role-session-name: GitHubActionsMcpEcsDeploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Render updated task definition
        id: render-task
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push-image.outputs.image-tag }}"

          aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_TASK_FAMILY }}" \
            --query 'taskDefinition' > /tmp/task-def.json

          jq --arg IMAGE "$IMAGE" \
            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) | .containerDefinitions[0].image = $IMAGE' \
            /tmp/task-def.json > /tmp/task-def-updated.json

      - name: Register new task definition revision
        id: register-task
        run: |
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def-updated.json \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task-def-arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER_NAME }}" \
            --service "${{ env.ECS_SERVICE_NAME }}" \
            --task-definition "${{ steps.register-task.outputs.task-def-arn }}"

      - name: Wait for stable deployment
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER_NAME }}" \
            --services "${{ env.ECS_SERVICE_NAME }}"

      - name: Health check
        # Retry for up to 3 minutes (12 × 15 s). Gives nginx time to register
        # the new container after ECS reports the service as stable.
        run: |
          MAX_ATTEMPTS=12
          SLEEP_SECS=15
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://${{ env.INGRESS_HOST }}/healthz" --max-time 15)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed — HTTP $STATUS (attempt $i/$MAX_ATTEMPTS)"
              exit 0
            fi
            echo "Attempt $i/$MAX_ATTEMPTS: HTTP $STATUS — waiting ${SLEEP_SECS}s..."
            sleep $SLEEP_SECS
          done
          echo "Health check failed after $MAX_ATTEMPTS attempts (last HTTP $STATUS)"
          exit 1

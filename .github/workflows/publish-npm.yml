name: Publish npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, run npm publish --dry-run"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  MCP_TOKEN_SECRET_ID: /testrelic/prod/MCP_TOKEN

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./packages/mcp/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match packages/mcp version $PKG"
            exit 1
          fi

      - run: npm install --no-audit --no-fund
      - run: npm --workspace @testrelic/mcp run build
      - run: cp LICENSE packages/mcp/LICENSE

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.GH_ACTIONS_ROLE_ARN }}
          role-session-name: GitHubActionsNpmPublish
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch npm token from Secrets Manager
        id: npm-token
        run: |
          RAW=$(aws secretsmanager get-secret-value \
            --secret-id "$MCP_TOKEN_SECRET_ID" \
            --query SecretString --output text)
          TOKEN=$(printf '%s' "$RAW" | jq -r '.NPM_MCP_KEY // .')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::NPM token not found in $MCP_TOKEN_SECRET_ID (neither JSON field NPM_MCP_KEY nor plain string)"
            exit 1
          fi
          echo "::add-mask::$TOKEN"
          echo "NODE_AUTH_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Skip if version already published
        id: skip-check
        run: |
          VER=$(node -p "require('./packages/mcp/package.json').version")
          if npm view "@testrelic/mcp@$VER" version --silent >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@testrelic/mcp@$VER already on npm — skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.skip-check.outputs.already_published == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --workspace @testrelic/mcp --access public --dry-run
          else
            npm publish --workspace @testrelic/mcp --access public --provenance
          fi

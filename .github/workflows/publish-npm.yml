name: Publish npm

# Publishes @testrelic/mcp via npm Trusted Publishing (OIDC). No long-lived npm
# write token — configure the publisher on npmjs: package → Settings → Trusted Publisher
# → GitHub Actions: org testrelic-ai, repo testrelic-mcp-server, workflow publish-npm.yml,
# environment prod (optional but recommended).
#
# GitHub Environment secrets: none required for publish. Optional read-only token for
# private npm deps — see optional step below (NPM_READ_TOKEN).
#
# Do NOT set NODE_AUTH_TOKEN on the publish job for OIDC publishing; npm resolves auth
# from the GitHub Actions OIDC token automatically.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, run npm publish --dry-run"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Trusted publishing requires Node >= 22.14 and npm >= 11.5.1 (npm docs).
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./packages/mcp/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match packages/mcp version $PKG"
            exit 1
          fi

      # Optional: read-only granular token if you ever add private @scope deps.
      # Secret name in GitHub prod environment: NPM_READ_TOKEN (maps to NODE_AUTH_TOKEN).
      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_READ_TOKEN }}
        run: npm install --no-audit --no-fund

      - run: npm --workspace @testrelic/mcp run build
      - run: cp LICENSE packages/mcp/LICENSE

      - name: Skip if version already published
        id: skip-check
        run: |
          VER=$(node -p "require('./packages/mcp/package.json').version")
          if npm view "@testrelic/mcp@$VER" version --silent >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@testrelic/mcp@$VER already on npm — skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm (Trusted Publishing / OIDC)
        if: steps.skip-check.outputs.already_published == 'false'
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --workspace @testrelic/mcp --access public --dry-run
          else
            npm publish --workspace @testrelic/mcp --access public
          fi

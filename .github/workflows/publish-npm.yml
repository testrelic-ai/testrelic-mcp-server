name: Publish npm

# GitHub Environment `prod`: add secret NPM_Publish_Token (npm granular publish token
# with write access to @testrelic/mcp, or classic token if your org policy allows).
# It is exposed to npm as NODE_AUTH_TOKEN for install and publish.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, run npm publish --dry-run"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: prod
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_Publish_Token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./packages/mcp/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match packages/mcp version $PKG"
            exit 1
          fi

      - run: npm install --no-audit --no-fund
      - run: npm --workspace @testrelic/mcp run build
      - run: cp LICENSE packages/mcp/LICENSE

      - name: Skip if version already published
        id: skip-check
        run: |
          VER=$(node -p "require('./packages/mcp/package.json').version")
          if npm view "@testrelic/mcp@$VER" version --silent >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::@testrelic/mcp@$VER already on npm — skipping publish"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.skip-check.outputs.already_published == 'false'
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --workspace @testrelic/mcp --access public --dry-run
          else
            npm publish --workspace @testrelic/mcp --access public --provenance
          fi
